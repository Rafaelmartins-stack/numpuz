<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUMPUZ PREMIER - Puzzle de Números</title>
    <meta name="description" content="Um elegante puzzle de deslizar números para desafiar seu raciocínio lógico.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="game-container">
        <header>
            <h1>NUMPUZ <span class="accent">PREMIER</span></h1>
        </header>

        <main>
            <div class="grid-wrapper">
                <div id="puzzle-grid" class="puzzle-grid"></div>
                <div id="game-over" class="hidden">
                    <div class="game-over-content">
                        <h2>PARABÉNS!</h2>
                        <p>Você resolveu em <span id="final-moves">0</span> movimentos</p>
                        <p>Tempo: <span id="final-time">00:00</span></p>
                        <button id="restart-btn">Jogar Novamente</button>
                    </div>
                </div>
            </div>

            <aside class="sidebar">
                <div class="stat-card">
                    <h3>MOVIMENTOS</h3>
                    <div id="move-count" class="stat-value">0</div>
                </div>
                <div class="stat-card">
                    <h3>TEMPO</h3>
                    <div id="timer" class="stat-value">00:00</div>
                </div>
                <div class="stat-card difficulty-card">
                    <h3>MODO DE JOGO</h3>
                    <div class="difficulty-options">
                        <button class="diff-btn active" data-size="3">3x3 Padrão</button>
                    </div>
                </div>
                <div class="controls-hint">
                    <p>Clique nas peças para deslizar.</p>
                    <p>Ordene os números sequencialmente.</p>
                </div>
            </aside>
        </main>
    </div>
    <script src="game.js"></script>
</body>
</html>
